syntax = "proto3";

package arcanum.chaincode.v1;

option go_package = "arcanum/x/chaincode/types";

import "gogoproto/gogo.proto";
import "arcanum/chaincode/v1/params.proto";
import "arcanum/chaincode/v1/query.proto";

message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false, (gogoproto.moretags) = "yaml:\"params\""];
  repeated ChaincodeAnchor anchors = 2 [(gogoproto.nullable) = false, (gogoproto.moretags) = "yaml:\"anchors\""];
}
