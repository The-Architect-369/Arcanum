syntax = "proto3";

package arcanum.mana.v1;

option go_package = "arcanum/x/mana/types";

import "gogoproto/gogo.proto";
import "arcanum/mana/v1/params.proto";
import "arcanum/mana/v1/query.proto";

message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false, (gogoproto.moretags) = "yaml:\"params\""];
  repeated ManaBalance balances = 2 [(gogoproto.moretags) = "yaml:\"balances\""];
  string supply = 3 [(gogoproto.moretags) = "yaml:\"supply\""];
}
